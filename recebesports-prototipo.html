<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RecebeSports — Painel do Organizador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RECEBESPORTS — SISTEMA INTERNO DO ORGANIZADOR
   Redesign / Design System  ·  prototipo HTML+CSS+JS
   ============================================================ */
:root{
  /* brand */
  --brand:#FF6600;          --brand-700:#E25600;   --brand-300:#FFB47A;
  --brand-tint:#FFF1E6;     --brand-tint-2:#FFE3CC;
  /* dark navigation */
  --ink-900:#161719;       --ink-850:#1E2023;     --ink-800:#26282C;
  --ink-700:#33363B;       --ink-line:#34373D;    --ink-mut:#8E939C;
  /* surfaces */
  --bg:#EEF0F3;            --surface:#FFFFFF;     --surface-2:#F7F8FA;
  --line:#E4E7EC;          --line-2:#EDEFF2;
  /* text */
  --tx-1:#15171C;          --tx-2:#5A626E;        --tx-3:#9099A5;
  /* status */
  --ok:#1F9D55;   --ok-bg:#E5F5EC;
  --no:#E03B30;   --no-bg:#FCE9E8;
  --warn:#D98200; --warn-bg:#FBEFD9;
  --info:#2F6DE0; --info-bg:#E8F0FE;
  --grow:#27B36B;   /* running/growth green */
  /* geometry */
  --r-s:8px; --r-m:12px; --r-l:16px;
  --sb-w:248px; --sb-w-min:74px; --hd-h:66px;
  --shadow-s:0 1px 2px rgba(16,20,28,.05);
  --shadow-m:0 4px 14px -4px rgba(16,20,28,.12),0 2px 5px -2px rgba(16,20,28,.07);
  --shadow-l:0 18px 44px -16px rgba(16,20,28,.28);
  --font-d:"Bricolage Grotesque",sans-serif;
  --font-b:"Hanken Grotesk",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-b);
  background:var(--bg);
  color:var(--tx-1);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"tnum";
}
::selection{background:var(--brand-tint-2);color:var(--brand-700)}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
.tnum{font-variant-numeric:tabular-nums}
.num{font-family:var(--font-d);font-variant-numeric:tabular-nums}

/* ---------- scrollbars ---------- */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#C7CCD4;border-radius:20px;border:3px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:#AAB1BC;background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}

/* ============================================================
   APP SHELL
   ============================================================ */
.app{display:flex;min-height:100vh}

/* ---------- SIDEBAR ---------- */
.sb{
  width:var(--sb-w);flex:none;background:var(--ink-900);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;z-index:40;
  transition:width .26s cubic-bezier(.4,0,.2,1);
}
.app.collapsed .sb{width:var(--sb-w-min)}
.sb-top{
  height:var(--hd-h);display:flex;align-items:center;gap:12px;
  padding:0 18px;border-bottom:1px solid var(--ink-line);flex:none;
}
.sb-burger{
  width:38px;height:38px;border-radius:10px;flex:none;
  display:grid;place-items:center;color:#fff;
  transition:background .15s;
}
.sb-burger:hover{background:var(--ink-700)}
.sb-burger svg{width:19px;height:19px}
.sb-brandmark{
  font-family:var(--font-d);font-weight:800;font-size:13px;letter-spacing:.04em;
  color:var(--ink-mut);text-transform:uppercase;white-space:nowrap;
  overflow:hidden;transition:opacity .18s;
}
.app.collapsed .sb-brandmark{opacity:0;width:0}

.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 12px 20px}
.sb-scroll::-webkit-scrollbar{width:6px}
.sb-scroll::-webkit-scrollbar-thumb{background:#3a3d44}

.nav-sec{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;
  color:#5d626c;font-weight:700;padding:16px 12px 7px;white-space:nowrap}
.app.collapsed .nav-sec{opacity:0;height:8px;padding:4px 0}

.nav-i{
  display:flex;align-items:center;gap:12px;width:100%;
  padding:9px 12px;border-radius:10px;color:#B7BCC4;
  font-size:13.5px;font-weight:500;white-space:nowrap;position:relative;
  transition:background .14s,color .14s;
}
.nav-i:hover{background:var(--ink-800);color:#fff}
.nav-i .ic{width:20px;height:20px;flex:none;display:grid;place-items:center}
.nav-i .ic svg{width:19px;height:19px}
.nav-i .lbl{flex:1;overflow:hidden;transition:opacity .16s}
.nav-i .chev{width:14px;height:14px;flex:none;transition:transform .2s;opacity:.6}
.nav-i.open .chev{transform:rotate(90deg)}
.app.collapsed .nav-i .lbl,.app.collapsed .nav-i .chev{opacity:0;width:0}
.nav-i.active{background:linear-gradient(90deg,rgba(255,102,0,.16),rgba(255,102,0,.03));color:#fff;font-weight:600}
.nav-i.active::before{
  content:"";position:absolute;left:-12px;top:7px;bottom:7px;width:3.5px;
  background:var(--brand);border-radius:0 4px 4px 0;
}
.nav-i.active .ic{color:var(--brand)}

.nav-sub{overflow:hidden;max-height:0;transition:max-height .26s ease}
.nav-sub.open{max-height:420px}
.app.collapsed .nav-sub{max-height:0!important}
.nav-si{
  display:flex;align-items:center;gap:10px;
  padding:7px 12px 7px 44px;border-radius:9px;color:#9ca1ab;
  font-size:13px;font-weight:500;white-space:nowrap;position:relative;
  transition:background .14s,color .14s;
}
.nav-si::before{content:"";position:absolute;left:23px;top:0;bottom:0;width:1.5px;background:var(--ink-line)}
.nav-si:hover{background:var(--ink-800);color:#fff}
.nav-si.active{color:#fff;font-weight:600}
.nav-si.active::after{content:"";position:absolute;left:18px;top:50%;
  width:7px;height:7px;margin-top:-3.5px;border-radius:50%;background:var(--brand)}

.sb-foot{padding:14px 12px;border-top:1px solid var(--ink-line);flex:none}
.sb-help{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;
  background:var(--ink-800);color:#cfd3da;font-size:12.5px;font-weight:500;white-space:nowrap;
}
.sb-help svg{width:17px;height:17px;flex:none;color:var(--brand)}
.sb-help .lbl{overflow:hidden;transition:opacity .16s}
.app.collapsed .sb-help{justify-content:center}
.app.collapsed .sb-help .lbl{opacity:0;width:0}

/* ---------- MAIN COLUMN ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}

/* ---------- HEADER ---------- */
.hd{
  height:var(--hd-h);background:var(--ink-850);flex:none;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 22px 0 24px;position:sticky;top:0;z-index:30;
}
.hd-logo{height:30px;display:flex;align-items:center}
.hd-logo svg{height:30px;width:auto;display:block}
.hd-right{display:flex;align-items:center;gap:10px}
.hd-search{
  display:flex;align-items:center;gap:9px;background:var(--ink-800);
  border:1px solid var(--ink-line);border-radius:10px;padding:0 13px;height:40px;
  width:248px;transition:border-color .15s,width .2s;
}
.hd-search:focus-within{border-color:var(--brand);width:300px}
.hd-search svg{width:16px;height:16px;color:var(--ink-mut);flex:none}
.hd-search input{background:none;border:none;outline:none;color:#fff;width:100%;font-size:13px}
.hd-search input::placeholder{color:#6b7079}
.hd-icbtn{
  width:40px;height:40px;border-radius:10px;display:grid;place-items:center;
  color:#c4c8cf;position:relative;transition:background .14s,color .14s;
}
.hd-icbtn:hover{background:var(--ink-800);color:#fff}
.hd-icbtn svg{width:19px;height:19px}
.hd-dot{position:absolute;top:8px;right:9px;width:8px;height:8px;border-radius:50%;
  background:var(--brand);border:2px solid var(--ink-850)}
.hd-div{width:1px;height:30px;background:var(--ink-line);margin:0 4px}
.hd-user{display:flex;align-items:center;gap:11px;padding:5px 6px 5px 12px;border-radius:12px;
  transition:background .14s}
.hd-user:hover{background:var(--ink-800)}
.hd-user .u-txt{text-align:right;line-height:1.25}
.hd-user .u-name{color:#fff;font-weight:700;font-size:13px}
.hd-user .u-org{color:var(--ink-mut);font-size:11px}
.hd-avt{
  width:40px;height:40px;border-radius:11px;flex:none;
  display:grid;place-items:center;font-family:var(--font-d);font-weight:800;
  font-size:16px;color:#fff;background:linear-gradient(150deg,#FF7A1F,#E25600);
  box-shadow:0 3px 9px -2px rgba(255,102,0,.55);
}
@media(max-width:980px){.hd-search,.hd-user .u-txt{display:none}}

/* ---------- BREADCRUMB BAR ---------- */
.bc{
  background:var(--surface);border-bottom:1px solid var(--line);
  padding:14px 30px;display:flex;align-items:center;justify-content:space-between;
  flex:none;gap:18px;flex-wrap:wrap;
}
.bc-left{display:flex;align-items:center;gap:13px;min-width:0}
.bc-ic{width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;
  background:var(--brand-tint);color:var(--brand-700)}
.bc-ic svg{width:20px;height:20px}
.bc-tt{min-width:0}
.bc-trail{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--tx-3);font-weight:600;
  text-transform:uppercase;letter-spacing:.05em}
.bc-trail .sep{color:var(--line);font-size:13px}
.bc-trail .cur{color:var(--brand-700)}
.bc-h1{font-family:var(--font-d);font-weight:700;font-size:21px;letter-spacing:-.01em;
  color:var(--tx-1);line-height:1.15;margin-top:1px}
.bc-right{display:flex;align-items:center;gap:9px}

/* ---------- CONTENT ---------- */
.content{padding:26px 30px 60px;flex:1}
.view{display:none;animation:fade .32s ease both}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ============================================================
   PRIMITIVES
   ============================================================ */
.btn{
  display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 16px;
  border-radius:10px;font-weight:600;font-size:13px;white-space:nowrap;
  transition:transform .08s,box-shadow .15s,background .15s,border-color .15s;
  border:1px solid transparent;
}
.btn:active{transform:translateY(1px)}
.btn svg{width:16px;height:16px}
.btn-pri{background:var(--brand);color:#fff;box-shadow:0 4px 12px -3px rgba(255,102,0,.5)}
.btn-pri:hover{background:var(--brand-700)}
.btn-dark{background:var(--ink-850);color:#fff}
.btn-dark:hover{background:var(--ink-900)}
.btn-ghost{background:var(--surface);color:var(--tx-1);border-color:var(--line)}
.btn-ghost:hover{border-color:#cdd2da;background:var(--surface-2)}
.btn-soft{background:var(--brand-tint);color:var(--brand-700)}
.btn-soft:hover{background:var(--brand-tint-2)}
.btn-ic{width:40px;height:40px;padding:0;justify-content:center}
.btn-sm{height:33px;padding:0 12px;font-size:12.5px;border-radius:9px}
.btn-sm svg{width:14px;height:14px}

.chip{display:inline-flex;align-items:center;gap:6px;height:25px;padding:0 10px;
  border-radius:7px;font-size:11.5px;font-weight:700;letter-spacing:.01em}
.chip svg{width:12px;height:12px}
.chip .pdot{width:6px;height:6px;border-radius:50%}
.c-ok{background:var(--ok-bg);color:var(--ok)}
.c-no{background:var(--no-bg);color:var(--no)}
.c-warn{background:var(--warn-bg);color:var(--warn)}
.c-info{background:var(--info-bg);color:var(--info)}
.c-mut{background:var(--surface-2);color:var(--tx-2);border:1px solid var(--line)}

.tag{display:inline-flex;align-items:center;height:22px;padding:0 8px;border-radius:6px;
  font-size:11px;font-weight:700;background:var(--surface-2);color:var(--tx-2);border:1px solid var(--line)}

/* ---------- card ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-l);
  box-shadow:var(--shadow-s)}
.card-h{display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:17px 20px;border-bottom:1px solid var(--line-2)}
.card-h .ttl{font-family:var(--font-d);font-weight:600;font-size:15px;letter-spacing:-.005em}
.card-h .sub{font-size:12px;color:var(--tx-3);font-weight:500;margin-top:1px}
.card-b{padding:20px}
.card-h .htools{display:flex;align-items:center;gap:7px}

.dot-act{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;
  color:var(--tx-3);transition:background .14s,color .14s}
.dot-act:hover{background:var(--surface-2);color:var(--tx-1)}
.dot-act svg{width:16px;height:16px}

/* ---------- grids ---------- */
.grid{display:grid;gap:18px}
.g-2{grid-template-columns:repeat(2,1fr)}
.g-3{grid-template-columns:repeat(3,1fr)}
.g-4{grid-template-columns:repeat(4,1fr)}
.g-5{grid-template-columns:repeat(5,1fr)}
@media(max-width:1240px){.g-4,.g-5{grid-template-columns:repeat(2,1fr)}.g-3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:860px){.grid{grid-template-columns:1fr!important}}
.span-2{grid-column:span 2}
@media(max-width:860px){.span-2{grid-column:span 1}}

/* ---------- KPI ---------- */
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-m);
  padding:17px 18px;position:relative;overflow:hidden;box-shadow:var(--shadow-s)}
.kpi-top{display:flex;align-items:center;justify-content:space-between}
.kpi-ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center}
.kpi-ic svg{width:18px;height:18px}
.kpi-lbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--tx-3);margin-top:13px}
.kpi-val{font-family:var(--font-d);font-weight:700;font-size:27px;letter-spacing:-.02em;
  margin-top:3px;line-height:1.1}
.kpi-val .cur{font-size:15px;color:var(--tx-3);font-weight:600;margin-right:2px}
.kpi-foot{display:flex;align-items:center;gap:6px;margin-top:9px;font-size:11.5px;
  font-weight:600;color:var(--tx-2)}
.kpi-delta{display:inline-flex;align-items:center;gap:3px;font-weight:700}
.kpi-delta svg{width:12px;height:12px}
.up{color:var(--ok)} .down{color:var(--no)}
.kpi-spark{position:absolute;right:0;bottom:0;width:96px;height:42px;opacity:.85}

/* ---------- table ---------- */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl thead th{
  text-align:left;font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--tx-3);padding:11px 14px;background:var(--surface-2);white-space:nowrap;
  border-bottom:1px solid var(--line);position:sticky;top:0;
}
.tbl thead th:first-child{border-radius:0}
.tbl tbody td{padding:13px 14px;border-bottom:1px solid var(--line-2);vertical-align:middle}
.tbl tbody tr{transition:background .12s}
.tbl tbody tr:hover{background:var(--surface-2)}
.tbl tbody tr:last-child td{border-bottom:none}
.t-strong{font-weight:700;color:var(--tx-1)}
.t-mut{color:var(--tx-3);font-size:12px}
.t-id{font-family:var(--font-d);font-weight:700;color:var(--brand-700);font-size:12.5px}
.t-link{color:var(--info);font-weight:600}
.t-2line .l1{font-weight:600;color:var(--tx-1)}
.t-2line .l2{color:var(--tx-3);font-size:11.5px;margin-top:1px}
.ckbox{width:17px;height:17px;border:1.6px solid #c4cad3;border-radius:5px;
  display:grid;place-items:center;flex:none;cursor:pointer;background:#fff;transition:.12s}
.ckbox:hover{border-color:var(--brand)}
.ckbox svg{width:11px;height:11px;color:#fff;opacity:0}
.ckbox.on{background:var(--brand);border-color:var(--brand)}
.ckbox.on svg{opacity:1}
.row-acts{display:flex;align-items:center;gap:3px}
.ra{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;
  color:var(--tx-3);transition:.13s}
.ra:hover{background:var(--brand-tint);color:var(--brand-700)}
.ra svg{width:15px;height:15px}

/* avatar mini */
.avt-s{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center;
  font-weight:700;font-size:13px;color:#fff;font-family:var(--font-d)}

/* toolbar */
.toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:15px 20px;border-bottom:1px solid var(--line-2)}
.tb-count{font-family:var(--font-d);font-weight:600;font-size:14px}
.tb-count b{color:var(--brand-700)}
.tb-spacer{flex:1}
.fld{display:flex;flex-direction:column;gap:6px}
.fld-lbl{font-size:11.5px;font-weight:700;color:var(--tx-2);display:flex;align-items:center;gap:4px}
.fld-lbl .req{color:var(--brand)}
.inp,.sel{
  height:40px;border:1px solid var(--line);border-radius:10px;background:#fff;
  padding:0 13px;font-size:13px;color:var(--tx-1);outline:none;width:100%;
  transition:border-color .14s,box-shadow .14s;
}
.inp::placeholder{color:var(--tx-3)}
.inp:focus,.sel:focus{border-color:var(--brand);box-shadow:0 0 0 3.5px rgba(255,102,0,.13)}
.inp:disabled{background:var(--surface-2);color:var(--tx-3)}
textarea.inp{height:auto;padding:11px 13px;resize:vertical;line-height:1.55}
.sel{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239099A5' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
  background-repeat:no-repeat;background-position:right 12px center;padding-right:34px}
.inp-ic{position:relative}
.inp-ic svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;color:var(--tx-3)}
.inp-ic .inp{padding-left:38px}
.inp-suffix{position:absolute;right:11px;top:50%;transform:translateY(-50%);
  width:24px;height:24px;border-radius:7px;display:grid;place-items:center;color:var(--tx-3)}
.search-w{position:relative;flex:1;min-width:220px}

/* pagination */
.pager{display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:14px 20px;flex-wrap:wrap}
.pager-info{font-size:12.5px;color:var(--tx-3);font-weight:500}
.pages{display:flex;align-items:center;gap:4px}
.pg{min-width:34px;height:34px;padding:0 8px;border-radius:9px;display:grid;place-items:center;
  font-size:13px;font-weight:600;color:var(--tx-2);border:1px solid transparent;transition:.13s}
.pg:hover{background:var(--surface-2)}
.pg.on{background:var(--ink-850);color:#fff}
.pg.dis{opacity:.4;pointer-events:none}
.pg svg{width:15px;height:15px}

/* segmented tabs */
.tabs{display:flex;gap:3px;background:var(--surface-2);border:1px solid var(--line);
  border-radius:12px;padding:4px}
.tab{padding:8px 16px;border-radius:9px;font-size:13px;font-weight:600;color:var(--tx-2);
  display:flex;align-items:center;gap:7px;transition:.14s;white-space:nowrap}
.tab svg{width:15px;height:15px}
.tab:hover{color:var(--tx-1)}
.tab.on{background:var(--surface);color:var(--brand-700);box-shadow:var(--shadow-s)}

/* toggle */
.tg{width:38px;height:22px;border-radius:20px;background:#cfd4dc;position:relative;
  flex:none;transition:background .18s;cursor:pointer}
.tg::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;
  border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .18s}
.tg.on{background:var(--brand)}
.tg.on::after{transform:translateX(16px)}

/* section subtitle */
.sec-tt{display:flex;align-items:center;gap:9px;margin:4px 0 13px;
  font-family:var(--font-d);font-weight:600;font-size:15px}
.sec-tt .bar{width:4px;height:17px;border-radius:3px;background:var(--brand)}
.sec-tt .ic{width:30px;height:30px;border-radius:8px;background:var(--brand-tint);
  color:var(--brand-700);display:grid;place-items:center}
.sec-tt .ic svg{width:16px;height:16px}

/* progress */
.bar-track{height:8px;border-radius:6px;background:var(--line-2);overflow:hidden}
.bar-fill{height:100%;border-radius:6px;background:var(--brand)}

/* list-row used in distance/category breakdowns */
.lrow{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line-2)}
.lrow:last-child{border-bottom:none}
.lrow .sw{width:11px;height:11px;border-radius:4px;flex:none}
.lrow .ln{flex:1;font-weight:600;font-size:13px;color:var(--tx-1);min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lrow .lv{font-family:var(--font-d);font-weight:700;font-size:13.5px}
.lrow .lp{font-size:11.5px;color:var(--tx-3);font-weight:600;width:48px;text-align:right}

/* mini def list */
.defs{display:grid;grid-template-columns:1fr;gap:1px}
.def{display:flex;justify-content:space-between;gap:14px;padding:9px 0;
  border-bottom:1px dashed var(--line);font-size:13px}
.def:last-child{border-bottom:none}
.def .k{color:var(--tx-2);font-weight:500}
.def .v{font-weight:700;color:var(--tx-1);text-align:right}

/* banner */
.banner{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:11px;
  font-size:13px;font-weight:600}
.banner svg{width:18px;height:18px;flex:none}
.banner-ok{background:var(--ok-bg);color:var(--ok)}
.banner-warn{background:var(--warn-bg);color:var(--warn)}

/* upload zone */
.upz{border:2px dashed var(--line);border-radius:var(--r-m);background:var(--surface-2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  padding:30px 20px;text-align:center;transition:.15s;cursor:pointer;color:var(--tx-3)}
.upz:hover{border-color:var(--brand-300);background:var(--brand-tint);color:var(--brand-700)}
.upz svg{width:30px;height:30px}
.upz .ut{font-weight:700;font-size:13px}
.upz .us{font-size:11.5px}

/* form group panel */
.fpanel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-l);
  box-shadow:var(--shadow-s);overflow:hidden}
.fpanel-h{display:flex;align-items:center;gap:9px;padding:15px 20px;
  border-bottom:1px solid var(--line-2);background:var(--surface-2)}
.fpanel-h .ic{width:30px;height:30px;border-radius:8px;background:var(--brand);color:#fff;
  display:grid;place-items:center}
.fpanel-h .ic svg{width:16px;height:16px}
.fpanel-h .tt{font-family:var(--font-d);font-weight:600;font-size:14px;letter-spacing:.01em}
.fpanel-b{padding:20px}
.fgrid{display:grid;gap:15px 16px}

/* tooltip-ish footer */
.foot{text-align:center;padding:24px;color:var(--tx-3);font-size:12px}
.foot b{color:var(--brand-700);font-weight:700}

/* misc helpers */
.row{display:flex;align-items:center;gap:10px}
.muted{color:var(--tx-3)}
.hint{font-size:11.5px;color:var(--tx-3)}
.ev-pill{display:inline-flex;align-items:center;gap:8px;background:var(--surface-2);
  border:1px solid var(--line);border-radius:10px;padding:7px 12px;font-size:12.5px;font-weight:600;
  white-space:nowrap}
.ev-pill .num{color:var(--brand-700)}

/* mobile overlay */
.scrim{position:fixed;inset:0;background:rgba(15,18,24,.5);z-index:35;display:none}
@media(max-width:760px){
  .sb{position:fixed;left:0;transform:translateX(-100%);transition:transform .26s}
  .app.mobopen .sb{transform:none}
  .app.mobopen .scrim{display:block}
  .content{padding:18px 14px 50px}
  .bc{padding:13px 16px}
}

/* ── lotes de inscrição ── */
.lote-row{display:flex;align-items:flex-end;gap:14px;padding:16px 2px;flex-wrap:wrap}
.lote-row .fld{flex:1;min-width:150px}
.lote-tag{display:inline-flex;align-items:center;height:38px;padding:0 14px;border-radius:9px;
  background:var(--brand);color:#fff;font-family:var(--font-d);font-weight:600;font-size:12.5px;
  white-space:nowrap;margin-bottom:1px}
.lote-arrow{display:flex;align-items:center;color:var(--tx-3);margin-bottom:9px}
.lote-arrow svg{width:18px;height:18px}

/* ── rich-text toolbar ── */
.rt-toolbar{display:flex;flex-wrap:wrap;gap:4px;padding:8px;background:var(--surface-2);
  border:1px solid var(--line);border-bottom:none;border-radius:10px 10px 0 0}
.rt-btn{height:30px;min-width:32px;padding:0 9px;border-radius:7px;border:1px solid transparent;
  background:transparent;color:var(--tx-2);font-family:var(--font-b);font-size:12px;font-weight:700;
  cursor:pointer;transition:.13s}
.rt-btn:hover{background:var(--surface);border-color:var(--line);color:var(--tx-1)}

/* ── map mock ── */
.map-mock{position:relative;height:240px;border-radius:0 0 12px 12px;overflow:hidden;
  background:linear-gradient(135deg,#E8EDF2 0%,#DCE4EA 100%)}
.map-grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(110,125,140,.13) 1px,transparent 1px),
  linear-gradient(90deg,rgba(110,125,140,.13) 1px,transparent 1px);
  background-size:34px 34px}
.map-grid::after{content:"";position:absolute;left:-10%;top:38%;width:130%;height:13px;
  background:rgba(255,102,0,.22);transform:rotate(-9deg);border-radius:8px}
.map-grid::before{content:"";position:absolute;left:18%;top:-10%;width:11px;height:130%;
  background:rgba(47,109,224,.16);transform:rotate(7deg)}
.map-pin{position:absolute;left:50%;top:48%;transform:translate(-50%,-100%);
  width:42px;height:42px;display:flex;align-items:center;justify-content:center;
  color:var(--brand);filter:drop-shadow(0 6px 10px rgba(15,18,24,.28))}
.map-pin svg{width:42px;height:42px}
.map-pin::after{content:"";position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
  width:16px;height:5px;border-radius:50%;background:rgba(15,18,24,.25)}

/* ── 2-column form layout ── */
.form-2col{display:grid;grid-template-columns:1.55fr 1fr;gap:18px;align-items:start}
@media(max-width:980px){.form-2col{grid-template-columns:1fr}}

/* ── report summary aside ── */
.rep-aside{display:flex;flex-direction:column;gap:14px}
.rep-sum{background:var(--ink-900);border-radius:var(--r-l);padding:20px;color:#fff;
  position:relative;overflow:hidden}
.rep-sum::after{content:"";position:absolute;right:-30px;top:-30px;width:130px;height:130px;
  border-radius:50%;background:radial-gradient(circle,rgba(255,102,0,.32),transparent 70%)}
.rep-sum h4{font-family:var(--font-d);font-size:13px;font-weight:600;letter-spacing:.04em;
  text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:14px;position:relative}
.rep-sum .rs-row{display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;border-bottom:1px solid rgba(255,255,255,.09);font-size:13px;position:relative}
.rep-sum .rs-row:last-of-type{border-bottom:none}
.rep-sum .rs-row .k{color:rgba(255,255,255,.62);font-weight:500}
.rep-sum .rs-row .v{font-family:var(--font-d);font-weight:600;color:#fff}
.rep-fmt{display:flex;gap:8px;flex-wrap:wrap}
.fmt-chip{flex:1;min-width:74px;display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:13px 8px;border-radius:11px;border:1.5px solid var(--line);background:var(--surface);
  cursor:pointer;transition:.14s;font-size:11.5px;font-weight:700;color:var(--tx-2)}
.fmt-chip svg{width:20px;height:20px;color:var(--tx-3)}
.fmt-chip:hover{border-color:#cdd2da;background:var(--surface-2)}
.fmt-chip.on{border-color:var(--brand);background:var(--brand-tint);color:var(--brand-700)}
.fmt-chip.on svg{color:var(--brand)}

/* ── info-note ── */
.inote{display:flex;gap:11px;padding:14px 16px;border-radius:11px;background:var(--info-bg);
  border:1px solid rgba(47,109,224,.2);font-size:12.5px;color:var(--tx-2);line-height:1.55}
.inote svg{width:17px;height:17px;color:var(--info);flex-shrink:0;margin-top:1px}

/* ── file uploader ── */
.uploader{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
  width:184px;min-height:158px;flex:none;border:1.6px dashed #cdd2da;border-radius:14px;
  background:var(--surface-2);cursor:pointer;transition:.15s;text-align:center;padding:16px}
.uploader:hover{border-color:var(--brand);background:var(--brand-tint)}
.up-ic{width:42px;height:42px;border-radius:11px;background:var(--surface);
  display:flex;align-items:center;justify-content:center;color:var(--brand);box-shadow:var(--shadow-s)}
.up-ic svg{width:20px;height:20px}
.up-t{font-family:var(--font-d);font-weight:600;font-size:12.5px;color:var(--tx-1)}
.up-s{font-size:11px;color:var(--tx-3);font-weight:500}

/* ── form section divider ── */
.fsep{display:flex;align-items:center;gap:8px;margin:22px 0 4px;
  font-family:var(--font-d);font-weight:600;font-size:12px;letter-spacing:.05em;
  text-transform:uppercase;color:var(--tx-2)}
.fsep svg{width:14px;height:14px;color:var(--brand)}
.fsep::after{content:"";flex:1;height:1px;background:var(--line)}

/* ── org top row (uploader + fields) ── */
.org-top{display:flex;gap:20px;align-items:flex-start}
@media(max-width:620px){.org-top{flex-direction:column}.uploader{width:100%}}

/* ── toggle switch ── */
.tgl{position:relative;width:38px;height:22px;border-radius:99px;border:none;
  background:#cdd2da;cursor:pointer;transition:.16s;flex:none;padding:0}
.tgl span{position:absolute;left:3px;top:3px;width:16px;height:16px;border-radius:50%;
  background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3);transition:.16s}
.tgl.on{background:var(--brand)}
.tgl.on span{transform:translateX(16px)}
.switch-row{display:flex;align-items:center;gap:10px;font-size:12.5px;font-weight:600;
  color:var(--tx-2);cursor:pointer;padding:3px 0}
.tgl-grid{display:flex;flex-direction:column;gap:6px;margin-top:8px}

</style>
</head>

/* ============================================================
   CHART HELPERS  (hand-built SVG)
   ============================================================ */
function areaChart(data,{h=210,labels=[],grad='#27B36B',line='#1F9D55',cmp=null}={}){
  const w=1000,pl=10,pr=10,pt=14,pb=26;
  const max=Math.max(...data,...(cmp||[]))*1.18||1;
  const iw=w-pl-pr,ih=h-pt-pb;
  const X=i=>pl+(i/(data.length-1))*iw;
  const Y=v=>pt+ih-(v/max)*ih;
  const pts=data.map((v,i)=>[X(i),Y(v)]);
  // smooth path
  const smooth=p=>{let d=`M${p[0][0]},${p[0][1]}`;for(let i=0;i<p.length-1;i++){const c=p[i],n=p[i+1],mx=(c[0]+n[0])/2;d+=` C${mx},${c[1]} ${mx},${n[1]} ${n[0]},${n[1]}`;}return d;};
  const lp=smooth(pts);
  const ap=lp+` L${X(data.length-1)},${pt+ih} L${pl},${pt+ih} Z`;
  let grid='';for(let g=0;g<=3;g++){const y=pt+(g/3)*ih;grid+=`<line x1="${pl}" y1="${y}" x2="${w-pr}" y2="${y}" stroke="#EDEFF2" stroke-width="1"/>`;}
  let cmpPath='';
  if(cmp){const cp=cmp.map((v,i)=>[X(i),Y(v)]);cmpPath=`<path d="${smooth(cp)}" fill="none" stroke="#C7CCD4" stroke-width="2" stroke-dasharray="4 4"/>`;}
  let xlab='';
  const step=Math.ceil(labels.length/9);
  labels.forEach((l,i)=>{if(i%step===0){xlab+=`<text x="${X(i)}" y="${h-7}" font-size="11" fill="#9099A5" text-anchor="middle" font-weight="600">${l}</text>`;}});
  const gid='g'+Math.random().toString(36).slice(2,7);
  const last=pts[pts.length-1];
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${grad}" stop-opacity=".34"/>
      <stop offset="1" stop-color="${grad}" stop-opacity="0"/></linearGradient></defs>
    ${grid}${cmpPath}
    <path d="${ap}" fill="url(#${gid})"/>
    <path d="${lp}" fill="none" stroke="${line}" stroke-width="2.6" stroke-linejoin="round"/>
    ${xlab}
    <circle cx="${last[0]}" cy="${last[1]}" r="5" fill="#fff" stroke="${line}" stroke-width="2.6"/>
  </svg>`;
}
function sparkline(data,color){
  const w=120,h=42,max=Math.max(...data)||1,min=Math.min(...data);
  const X=i=>(i/(data.length-1))*w, Y=v=>h-2-((v-min)/((max-min)||1))*(h-8);
  let d='M'+X(0)+','+Y(data[0]);
  for(let i=1;i<data.length;i++)d+=' L'+X(i)+','+Y(data[i]);
  const a=d+` L${w},${h} L0,${h} Z`;
  const gid='s'+Math.random().toString(36).slice(2,7);
  return `<svg class="kpi-spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" x2="0" y1="0" y2="1">
    <stop offset="0" stop-color="${color}" stop-opacity=".28"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${a}" fill="url(#${gid})"/><path d="${d}" fill="none" stroke="${color}" stroke-width="2.2"/></svg>`;
}
function donut(segs,{size=176,center=''}={}){
  const r=size/2-16,c=size/2,circ=2*Math.PI*r;
  const total=segs.reduce((s,x)=>s+x.v,0)||1;
  let off=0,rings='';
  segs.forEach(s=>{
    const len=(s.v/total)*circ;
    rings+=`<circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${s.color}" stroke-width="20"
      stroke-dasharray="${len-2.5} ${circ-len+2.5}" stroke-dashoffset="${-off}" stroke-linecap="round"
      transform="rotate(-90 ${c} ${c})"/>`;
    off+=len;
  });
  return `<svg viewBox="0 0 ${size} ${size}" style="width:${size}px;height:${size}px">
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="#EDEFF2" stroke-width="20"/>
    ${rings}
    ${center?`<text x="${c}" y="${c-3}" text-anchor="middle" font-size="26" font-weight="800" font-family="Bricolage Grotesque" fill="#15171C">${center.split('|')[0]}</text>
    <text x="${c}" y="${c+16}" text-anchor="middle" font-size="11" font-weight="700" fill="#9099A5">${center.split('|')[1]||''}</text>`:''}
  </svg>`;
}
function gauge(pct,{label='',sub=''}={}){
  const size=240,c=size/2,r=92,sw=20;
  const start=Math.PI*0.82,end=Math.PI*2.18;
  const pol=(ang)=>[c+r*Math.cos(ang),c+r*Math.sin(ang)];
  const arc=(a0,a1,col,width)=>{
    const[x0,y0]=pol(a0),[x1,y1]=pol(a1);
    const large=(a1-a0)>Math.PI?1:0;
    return `<path d="M${x0},${y0} A${r},${r} 0 ${large} 1 ${x1},${y1}" fill="none" stroke="${col}" stroke-width="${width}" stroke-linecap="round"/>`;
  };
  const p=Math.min(pct,100)/100;
  const ang=start+(end-start)*p;
  // colored bg track segmented
  let track='';
  const segCols=['#E03B30','#E08600','#27B36B','#1F9D55'];
  for(let i=0;i<4;i++){
    const a0=start+(end-start)*(i/4)+ (i?0.03:0);
    const a1=start+(end-start)*((i+1)/4)-0.03;
    track+=arc(a0,a1,segCols[i],8);
  }
  const[nx,ny]=pol(ang);
  return `<svg viewBox="0 0 ${size} ${size-44}" style="width:100%;max-width:280px">
    ${track}
    ${arc(start,ang,'#FF6600',sw)}
    <circle cx="${nx}" cy="${ny}" r="9" fill="#fff" stroke="#FF6600" stroke-width="4"/>
    <text x="${c}" y="${c+4}" text-anchor="middle" font-size="34" font-weight="800" font-family="Bricolage Grotesque" fill="#15171C">${label}</text>
    <text x="${c}" y="${c+26}" text-anchor="middle" font-size="12" font-weight="700" fill="#9099A5">${sub}</text>
  </svg>`;
}

function kpi({label,val,cur,icon,tint,delta,foot,spark,sparkColor,valColor}){

    ${foot?`<div class="kpi-foot">${foot}</div>`:''}
    ${spark?sparkline(spark,sparkColor||'#27B36B'):''}
  </div>`;
}
function chip(type,txt,dot){

function pager(total,perPage,active,pages){

}

function repField(f){
  if(f.t==='toggle'){
    return `<div class="row" style="justify-content:space-between;padding:11px 14px;background:var(--surface-2);
      border:1px solid var(--line);border-radius:11px;gap:12px;grid-column:span 2">
      <span style="font-weight:600;font-size:12.5px">${f.label}</span>
      <span class="tg ${f.on?'on':''}" onclick="this.classList.toggle('on')"></span></div>`;
  }
  let inner;
  if(f.t==='date'){
    inner=`<div class="inp-ic"><span style="left:auto;right:11px">${ic('calendar')}</span><input class="inp" value="${f.val||''}" placeholder="DD/MM/AAAA" style="padding-left:13px"></div>`;
  }else{
    const opts=(f.options||[]).map(o=>`<option>${o}</option>`).join('');
    inner=`<select class="sel">${f.ph?`<option>${f.ph}</option>`:''}${opts}</select>`;
  }
  return `<div class="fld" style="${f.span?`grid-column:span ${f.span}`:''}">
    <span class="fld-lbl">${f.label}${f.req?' <span class="req">*</span>':''}</span>${inner}</div>`;
}

/* router-level helpers */
.nav-grp{margin:1px 0}
@media(max-width:760px){#mobBurger{display:grid!important}}

<script>
/* ============================================================
   ROUTES
   ============================================================ */
const A={ // reusable action sets
  save:[{l:'Cancelar',i:'x',c:'btn-ghost'},{l:'Salvar Alterações',i:'save',c:'btn-pri'}],
};
const ROUTES={
  estatisticas:{fn:vEstatisticas,trail:['Dashboard'],title:'Estatísticas do Evento',icon:'pie',
    actions:[{l:'Atualizar',i:'refresh',c:'btn-ghost'},{l:'Exportar Painel',i:'download',c:'btn-dark'}]},
  financeiro:{fn:vFinanceiro,trail:['Dashboard'],title:'Dashboard Financeiro',icon:'trend',
    actions:[{l:'Exportar',i:'download',c:'btn-dark'}]},
  inscricoes:{fn:vInscricoes,trail:['Auto Gestão'],title:'Consulta de Inscrições',icon:'ticket',
    actions:[{l:'Exportar lista',i:'download',c:'btn-dark'}]},
  cupons:{fn:vCupons,trail:['Auto Gestão'],title:'Cupons de Desconto',icon:'bolt',
    actions:[{l:'Novo Cupom',i:'plus',c:'btn-pri'}]},
  eventos:{fn:vEventos,trail:['Auto Gestão'],title:'Gestão de Eventos',icon:'calendar',
    actions:[{l:'Novo Evento',i:'plus',c:'btn-pri'}]},
  contratos:{fn:vContratos,trail:['Auto Gestão'],title:'Meus Contratos',icon:'file',
    actions:[{l:'Solicitar Contrato',i:'plus',c:'btn-ghost'}]},
  organizador:{fn:vOrganizador,trail:['Auto Gestão'],title:'Meu Cadastro',icon:'building',
    actions:[{l:'Salvar Cadastro',i:'save',c:'btn-pri'}]},
  usuarios:{fn:vUsuarios,trail:['Auto Gestão'],title:'Usuários',icon:'users',
    actions:[{l:'Novo Usuário',i:'plus',c:'btn-pri',go:'usuario-edit'}]},
  'usuario-edit':{fn:vUsuarioEdit,trail:['Auto Gestão','Usuários'],title:'Editar Usuário',icon:'user',
    nav:'usuarios',actions:[{l:'Voltar',i:'chevL',c:'btn-ghost',go:'usuarios'},{l:'Salvar Usuário',i:'save',c:'btn-pri'}]},
};
['rel-crono','rel-crono-r','rel-inscricoes','rel-agrupadas','rel-externas','rel-base'].forEach(id=>{
  const r=REP[id];
  ROUTES[id]={fn:()=>reportView(r),trail:['Relatórios'],title:r.title,icon:r.icon,
    actions:[{l:'Agendar envio',i:'clock',c:'btn-ghost'}]};
});

/* ============================================================
   SIDEBAR NAV
   ============================================================ */
function renderNav(){
  let h='';
  NAV.forEach(item=>{
    if(item.sec){h+=`<div class="nav-sec">${item.sec}</div>`;return;}
    if(item.children){
      h+=`<div class="nav-grp">
        <button class="nav-i" data-grp="${item.id}" onclick="toggleGrp('${item.id}')">
          <span class="ic">${ic(item.icon)}</span><span class="lbl">${item.label}</span>
          <span class="chev">${ic('chevR')}</span>
        </button>
        <div class="nav-sub" data-sub="${item.id}">
          ${item.children.map(c=>`<button class="nav-si" data-nav="${c.id}" onclick="go('${c.id}')">${c.label}</button>`).join('')}
        </div>
      </div>`;
    }else{
      h+=`<button class="nav-i" data-nav="${item.id}" onclick="go('${item.id}')">
        <span class="ic">${ic(item.icon)}</span><span class="lbl">${item.label}</span>
      </button>`;
    }
  });
  document.getElementById('nav').innerHTML=h;
}
function groupOf(id){
  const g=NAV.find(x=>x.children&&x.children.some(c=>c.id===id));
  return g?g.id:null;
}
function toggleGrp(id){
  const btn=document.querySelector(`[data-grp="${id}"]`);
  const sub=document.querySelector(`[data-sub="${id}"]`);
  const open=!sub.classList.contains('open');
  btn.classList.toggle('open',open);
  sub.classList.toggle('open',open);
}
function openGrp(id){
  const btn=document.querySelector(`[data-grp="${id}"]`);
  const sub=document.querySelector(`[data-sub="${id}"]`);
  if(btn&&sub){btn.classList.add('open');sub.classList.add('open');}
}

/* ============================================================
   ROUTER
   ============================================================ */
function go(id){
  const r=ROUTES[id];
  if(!r){return go('estatisticas');}

  /* content */
  const c=document.getElementById('content');
  c.innerHTML=`<div class="view active">${r.fn()}</div>`;

  /* breadcrumb */
  document.getElementById('bcIcon').innerHTML=ic(r.icon);
  document.getElementById('bcTrail').innerHTML=
    r.trail.map(t=>`<span>${t}</span><span class="sep">${ic('chevR')}</span>`).join('')
    +`<span class="cur">${r.title}</span>`;
  document.getElementById('bcTitle').textContent=r.title;
  document.getElementById('bcActions').innerHTML=(r.actions||[]).map(a=>
    `<button class="btn ${a.c}" ${a.go?`onclick="go('${a.go}')"`:''}>${ic(a.i)} ${a.l}</button>`).join('');

  /* active nav */
  const navId=r.nav||id;
  document.querySelectorAll('.nav-i,.nav-si').forEach(n=>n.classList.remove('active'));
  const target=document.querySelector(`[data-nav="${navId}"]`);
  if(target)target.classList.add('active');
  const grp=groupOf(navId);
  if(grp){
    openGrp(grp);
    const gbtn=document.querySelector(`[data-grp="${grp}"]`);
    if(gbtn)gbtn.classList.add('active');
  }

  /* meta + scroll + url */
  document.title=`RecebeSports · ${r.title}`;
  window.scrollTo({top:0});
  c.scrollTop=0;
  if(location.hash.slice(1)!==id)history.replaceState(null,'',`#${id}`);
  toggleMobile(false);
}

/* ============================================================
   SHELL CONTROLS
   ============================================================ */
function toggleSidebar(){document.getElementById('app').classList.toggle('collapsed');}
function toggleMobile(open){
  const app=document.getElementById('app');
  if(open===undefined)open=!app.classList.contains('mobopen');
  app.classList.toggle('mobopen',open);
}

/* ============================================================
   INIT
   ============================================================ */
(function init(){
  renderNav();
  const start=(location.hash||'').slice(1);
  go(ROUTES[start]?start:'estatisticas');
  window.addEventListener('hashchange',()=>{
    const id=(location.hash||'').slice(1);
    if(ROUTES[id])go(id);
  });
})();
</script>
